<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ethic Client — Minecraft</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
:root {
  --g1: #0a1a0e;
  --g2: #0d2d14;
  --g3: #112b10;
  --accent: #3aff7a;
  --accent2: #1de06b;
  --accent-dim: rgba(58,255,122,0.18);
  --glass-bg: rgba(15,35,18,0.45);
  --glass-border: rgba(58,255,122,0.18);
  --text: #e8f5ec;
  --text-muted: #7aaa88;
  --radius: 16px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--g1);
  color: var(--text);
  overflow-x: hidden;
  min-height: 100vh;
}

/* ── ANIMATED GRADIENT BG ── */
.bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  pointer-events: none;
}
.bg-canvas::before {
  content: '';
  position: absolute;
  width: 200%; height: 200%;
  top: -50%; left: -50%;
  background:
    radial-gradient(ellipse 60% 50% at 20% 30%, rgba(29,224,107,0.22) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 80% 70%, rgba(58,255,122,0.15) 0%, transparent 55%),
    radial-gradient(ellipse 70% 40% at 50% 10%, rgba(17,43,16,0.9) 0%, transparent 70%),
    linear-gradient(160deg, #0a1a0e 0%, #0d2d14 40%, #061409 100%);
  animation: flowBg 14s ease-in-out infinite alternate;
}
.bg-canvas::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 40% 35% at 65% 20%, rgba(58,255,122,0.09) 0%, transparent 55%),
    radial-gradient(ellipse 55% 45% at 10% 80%, rgba(29,200,80,0.12) 0%, transparent 60%);
  animation: flowBg2 18s ease-in-out infinite alternate;
}
@keyframes flowBg {
  0%   { transform: translate(0,0) rotate(0deg); }
  50%  { transform: translate(3%, 4%) rotate(3deg); }
  100% { transform: translate(-2%, -3%) rotate(-2deg); }
}
@keyframes flowBg2 {
  0%   { transform: translate(0,0); }
  100% { transform: translate(-4%, 5%); }
}

/* grain overlay */
.grain {
  position: fixed;
  inset: 0;
  z-index: 0;
  opacity: .035;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
}

/* wrap all content above bg */
.wrap { position: relative; z-index: 1; }

/* ── NAVBAR ── */
nav {
  position: fixed;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 0;
  padding: 0 10px 0 18px;
  height: 54px;
  border-radius: 999px;
  background: rgba(8,22,11,0.35);
  backdrop-filter: blur(28px) saturate(1.8);
  -webkit-backdrop-filter: blur(28px) saturate(1.8);
  border: 1px solid rgba(58,255,122,0.22);
  box-shadow:
    0 0 0 1px rgba(58,255,122,0.06) inset,
    0 8px 32px rgba(0,0,0,0.45),
    0 0 60px rgba(58,255,122,0.06);
  white-space: nowrap;
  /* liquid glass highlight */
}
nav::before {
  content: '';
  position: absolute;
  top: 1px; left: 18px; right: 18px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(58,255,122,0.5), transparent);
  border-radius: 999px;
}
.nav-logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.15rem;
  letter-spacing: -0.02em;
  color: var(--accent);
  text-decoration: none;
  margin-right: 28px;
  display: flex; align-items: center; gap: 8px;
}
.nav-logo .dot {
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--accent);
  animation: pulse 2.4s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { transform: scale(1); opacity:1; }
  50%      { transform: scale(1.35); opacity:.7; }
}
.nav-links {
  display: flex; align-items: center; gap: 4px;
  list-style: none;
}
.nav-links a {
  font-size: .82rem;
  font-weight: 500;
  letter-spacing: .02em;
  color: var(--text-muted);
  text-decoration: none;
  padding: 6px 14px;
  border-radius: 999px;
  transition: color .2s, background .2s;
}
.nav-links a:hover { color: var(--text); background: rgba(58,255,122,0.08); }
.nav-cta {
  margin-left: 10px;
  display: flex; gap: 8px; align-items: center;
}
.btn-nav-login {
  font-family: 'DM Sans', sans-serif;
  font-size: .82rem; font-weight: 500;
  color: var(--text-muted);
  background: transparent;
  border: 1px solid rgba(58,255,122,0.2);
  padding: 7px 18px;
  border-radius: 999px;
  cursor: pointer;
  transition: color .2s, border-color .2s, background .2s;
  text-decoration: none;
}
.btn-nav-login:hover {
  color: var(--accent);
  border-color: rgba(58,255,122,0.55);
  background: rgba(58,255,122,0.07);
}
.btn-nav-buy {
  font-family: 'DM Sans', sans-serif;
  font-size: .82rem; font-weight: 600;
  color: #020e05;
  background: var(--accent);
  border: none;
  padding: 8px 20px;
  border-radius: 999px;
  cursor: pointer;
  transition: background .2s, box-shadow .2s, transform .15s;
  text-decoration: none;
  box-shadow: 0 0 18px rgba(58,255,122,0.35);
}
.btn-nav-buy:hover {
  background: #5fffaa;
  box-shadow: 0 0 28px rgba(58,255,122,0.6);
  transform: translateY(-1px);
}

/* ── HERO ── */
.hero {
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  padding: 140px 24px 100px;
}
.hero-badge {
  display: inline-flex; align-items: center; gap: 7px;
  font-size: .72rem; font-weight: 600; letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--accent);
  background: rgba(58,255,122,0.1);
  border: 1px solid rgba(58,255,122,0.25);
  padding: 5px 14px;
  border-radius: 999px;
  margin-bottom: 32px;
  animation: fadeUp .7s ease both;
}
.hero-badge::before {
  content:'';
  width:6px; height:6px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 6px var(--accent);
}
.hero h1 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(3rem, 8vw, 7rem);
  font-weight: 800;
  line-height: 1.0;
  letter-spacing: -0.04em;
  color: #ffffff;
  max-width: 900px;
  animation: fadeUp .8s .12s ease both;
}
.hero h1 span {
  color: var(--accent);
  text-shadow: 0 0 40px rgba(58,255,122,0.5);
}
.hero-sub {
  font-size: clamp(.95rem, 2vw, 1.15rem);
  color: var(--text-muted);
  max-width: 520px;
  line-height: 1.7;
  margin-top: 22px;
  font-weight: 300;
  animation: fadeUp .8s .22s ease both;
}
.hero-actions {
  display: flex; gap: 14px; flex-wrap: wrap;
  justify-content: center;
  margin-top: 42px;
  animation: fadeUp .8s .34s ease both;
}
.btn-primary {
  font-family: 'Syne', sans-serif;
  font-size: .9rem; font-weight: 700; letter-spacing: .03em;
  color: #020e05;
  background: var(--accent);
  border: none;
  padding: 14px 32px;
  border-radius: 999px;
  cursor: pointer;
  text-decoration: none;
  box-shadow: 0 0 30px rgba(58,255,122,0.4), 0 4px 16px rgba(0,0,0,0.3);
  transition: all .2s;
  display: inline-flex; align-items: center; gap: 8px;
}
.btn-primary:hover {
  background: #6affbb;
  box-shadow: 0 0 50px rgba(58,255,122,0.65), 0 4px 24px rgba(0,0,0,0.3);
  transform: translateY(-2px);
}
.btn-ghost {
  font-family: 'DM Sans', sans-serif;
  font-size: .9rem; font-weight: 500;
  color: var(--text-muted);
  background: transparent;
  border: 1px solid rgba(255,255,255,0.1);
  padding: 13px 28px;
  border-radius: 999px;
  cursor: pointer;
  text-decoration: none;
  transition: all .2s;
}
.btn-ghost:hover {
  color: var(--text);
  border-color: rgba(255,255,255,0.25);
  background: rgba(255,255,255,0.04);
  transform: translateY(-2px);
}

/* floating glass cards preview */
.hero-preview {
  margin-top: 70px;
  position: relative;
  width: 100%; max-width: 860px;
  height: 320px;
  animation: fadeUp .9s .5s ease both;
}
.preview-card {
  position: absolute;
  border-radius: 18px;
  background: rgba(12,28,15,0.55);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(58,255,122,0.18);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04) inset;
  overflow: hidden;
}
.preview-card::before {
  content:'';
  position:absolute;
  top:0; left:10%; right:10%; height:1px;
  background: linear-gradient(90deg, transparent, rgba(58,255,122,0.45), transparent);
}
.pc-main {
  width: 560px; height: 260px;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  padding: 20px 24px;
}
.pc-left {
  width: 220px; height: 180px;
  left: 0; top: 50%;
  transform: translateY(-50%) rotate(-4deg);
  opacity: .75;
  padding: 16px 18px;
}
.pc-right {
  width: 200px; height: 160px;
  right: 0; top: 50%;
  transform: translateY(-50%) rotate(4deg);
  opacity: .75;
  padding: 16px 18px;
}
.card-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 14px;
}
.card-dot { width: 7px; height: 7px; border-radius: 50%; }
.card-dot.green { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
.card-dot.yellow { background: #ffd060; }
.card-dot.red { background: #ff6060; }
.card-title-text {
  font-family: 'Syne', sans-serif;
  font-size: .75rem; font-weight: 700;
  color: var(--text-muted);
  margin-left: 4px;
}
.module-list { display: flex; flex-direction: column; gap: 7px; }
.module-item {
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(58,255,122,0.06);
  border: 1px solid rgba(58,255,122,0.1);
  border-radius: 8px;
  padding: 7px 12px;
}
.module-name { font-size: .72rem; font-weight: 500; color: var(--text); }
.module-toggle {
  width: 28px; height: 14px;
  border-radius: 999px;
  position: relative;
}
.module-toggle.on { background: var(--accent); box-shadow: 0 0 8px rgba(58,255,122,0.5); }
.module-toggle.off { background: rgba(255,255,255,0.1); }
.module-toggle::after {
  content:'';
  position:absolute;
  top:2px;
  width:10px; height:10px;
  border-radius:50%;
  background:#fff;
  transition: left .2s;
}
.module-toggle.on::after { left: 16px; }
.module-toggle.off::after { left: 2px; }
.hud-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.hud-box {
  background: rgba(58,255,122,0.07);
  border: 1px solid rgba(58,255,122,0.12);
  border-radius: 7px;
  padding: 8px 10px;
  font-size: .65rem;
  color: var(--text-muted);
}
.hud-box span { display: block; font-size: .8rem; font-weight: 600; color: var(--accent); margin-top: 2px; }

@keyframes fadeUp {
  from { opacity:0; transform: translateY(22px); }
  to   { opacity:1; transform: translateY(0); }
}

/* ── SECTION SHARED ── */
section { padding: 100px 24px; max-width: 1100px; margin: 0 auto; }
.section-label {
  font-size: .72rem; font-weight: 700; letter-spacing: .16em;
  text-transform: uppercase; color: var(--accent);
  margin-bottom: 16px;
  display: flex; align-items: center; gap: 10px;
}
.section-label::before {
  content:'';
  width: 28px; height: 1px;
  background: var(--accent);
  display:block;
}
.section-title {
  font-family: 'Syne', sans-serif;
  font-size: clamp(2rem, 4vw, 3.2rem);
  font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 1.1;
  color: #fff;
  margin-bottom: 18px;
}
.section-title span { color: var(--accent); }
.section-sub {
  font-size: 1rem; color: var(--text-muted);
  max-width: 500px; line-height: 1.7; font-weight: 300;
}

/* ── FEATURES ── */
.features-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-top: 56px;
}
@media(max-width:768px){ .features-grid { grid-template-columns: 1fr; } }
.feat-card {
  background: rgba(12,26,15,0.5);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(58,255,122,0.12);
  border-radius: 18px;
  padding: 28px 26px;
  position: relative;
  overflow: hidden;
  transition: transform .25s, border-color .25s, box-shadow .25s;
}
.feat-card::before {
  content:'';
  position:absolute;
  top:0; left:15%; right:15%; height:1px;
  background: linear-gradient(90deg, transparent, rgba(58,255,122,0.3), transparent);
}
.feat-card:hover {
  transform: translateY(-5px);
  border-color: rgba(58,255,122,0.28);
  box-shadow: 0 20px 50px rgba(0,0,0,0.4), 0 0 30px rgba(58,255,122,0.08);
}
.feat-num {
  font-family: 'Syne', sans-serif;
  font-size: .7rem; font-weight: 800;
  letter-spacing: .1em;
  color: rgba(58,255,122,0.35);
  margin-bottom: 16px;
}
.feat-icon {
  font-size: 1.5rem;
  margin-bottom: 14px;
  filter: drop-shadow(0 0 8px rgba(58,255,122,0.4));
}
.feat-card h3 {
  font-family: 'Syne', sans-serif;
  font-size: 1rem; font-weight: 700;
  color: #fff;
  margin-bottom: 8px;
  letter-spacing: -0.01em;
}
.feat-card p {
  font-size: .83rem; color: var(--text-muted);
  line-height: 1.65; font-weight: 300;
}
.feat-card.featured {
  border-color: rgba(58,255,122,0.3);
  background: rgba(20,50,25,0.6);
  grid-row: span 2;
}

/* ── PRICING ── */
.pricing-section { text-align: center; }
.pricing-section .section-sub { margin: 0 auto; }
.pricing-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-top: 56px;
}
@media(max-width:900px){ .pricing-grid { grid-template-columns: repeat(2,1fr); } }
@media(max-width:500px){ .pricing-grid { grid-template-columns: 1fr; } }
.price-card {
  background: rgba(12,26,15,0.5);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(58,255,122,0.12);
  border-radius: 22px;
  padding: 30px 22px 28px;
  position: relative;
  overflow: hidden;
  transition: transform .25s, border-color .25s, box-shadow .25s;
}
.price-card::before {
  content:'';
  position:absolute;
  top:0; left:20%; right:20%; height:1px;
  background: linear-gradient(90deg, transparent, rgba(58,255,122,0.25), transparent);
}
.price-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 24px 60px rgba(0,0,0,0.4), 0 0 40px rgba(58,255,122,0.1);
}
.price-card.popular {
  border-color: rgba(58,255,122,0.45);
  background: rgba(22,55,28,0.65);
  box-shadow: 0 0 50px rgba(58,255,122,0.12);
}
.popular-badge {
  position: absolute;
  top: 14px; right: 14px;
  font-size: .65rem; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase;
  color: #020e05;
  background: var(--accent);
  padding: 3px 10px;
  border-radius: 999px;
}
.price-period {
  font-family: 'Syne', sans-serif;
  font-size: 1rem; font-weight: 700;
  color: #fff;
  margin-bottom: 6px;
}
.price-big {
  font-family: 'Syne', sans-serif;
  font-size: 2.4rem; font-weight: 800;
  color: var(--accent);
  line-height: 1;
  margin: 12px 0 4px;
  letter-spacing: -0.04em;
}
.price-big sup { font-size: 1rem; vertical-align: super; }
.price-per {
  font-size: .75rem; color: var(--text-muted); margin-bottom: 20px;
}
.price-save {
  display: inline-block;
  font-size: .7rem; font-weight: 700;
  color: var(--accent);
  background: rgba(58,255,122,0.12);
  border: 1px solid rgba(58,255,122,0.2);
  padding: 3px 10px; border-radius: 999px;
  margin-bottom: 18px;
}
.price-features {
  list-style: none;
  text-align: left;
  margin-bottom: 24px;
}
.price-features li {
  font-size: .8rem; color: var(--text-muted);
  padding: 5px 0;
  display: flex; align-items: center; gap: 8px;
}
.price-features li::before {
  content: '✓';
  color: var(--accent);
  font-weight: 700;
  font-size: .75rem;
}
.btn-buy {
  width: 100%;
  font-family: 'Syne', sans-serif;
  font-size: .85rem; font-weight: 700;
  border-radius: 12px;
  padding: 12px;
  cursor: pointer;
  transition: all .2s;
  border: 1px solid rgba(58,255,122,0.3);
  background: rgba(58,255,122,0.08);
  color: var(--accent);
  text-decoration: none; display:block;
}
.btn-buy:hover {
  background: rgba(58,255,122,0.18);
  border-color: rgba(58,255,122,0.5);
  transform: translateY(-1px);
}
.price-card.popular .btn-buy {
  background: var(--accent);
  color: #020e05;
  border-color: transparent;
  box-shadow: 0 0 20px rgba(58,255,122,0.35);
}
.price-card.popular .btn-buy:hover {
  background: #6affbb;
  box-shadow: 0 0 35px rgba(58,255,122,0.55);
}

/* ── CONTACT ── */
.contact-section { text-align: center; }
.contact-cards {
  display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;
  margin-top: 50px;
}
.contact-card {
  display: flex; align-items: center; gap: 16px;
  background: rgba(12,26,15,0.5);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(58,255,122,0.14);
  border-radius: 20px;
  padding: 22px 32px;
  text-decoration: none;
  transition: all .25s;
  position: relative; overflow: hidden;
  min-width: 240px;
}
.contact-card::before {
  content:'';
  position:absolute;
  top:0; left:20%; right:20%; height:1px;
  background: linear-gradient(90deg, transparent, rgba(58,255,122,0.3), transparent);
}
.contact-card:hover {
  transform: translateY(-5px);
  border-color: rgba(58,255,122,0.35);
  box-shadow: 0 20px 50px rgba(0,0,0,0.4), 0 0 30px rgba(58,255,122,0.1);
}
.contact-icon {
  width: 46px; height: 46px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem;
}
.contact-icon.discord { background: rgba(88,101,242,0.2); border: 1px solid rgba(88,101,242,0.3); }
.contact-icon.telegram { background: rgba(38,166,209,0.2); border: 1px solid rgba(38,166,209,0.3); }
.contact-info { text-align: left; }
.contact-info strong {
  font-family: 'Syne', sans-serif;
  font-size: .95rem; font-weight: 700;
  color: #fff; display: block;
}
.contact-info span { font-size: .78rem; color: var(--text-muted); }

/* ── LOGIN MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 999;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .3s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: rgba(12,28,15,0.88);
  backdrop-filter: blur(30px);
  border: 1px solid rgba(58,255,122,0.2);
  border-radius: 24px;
  padding: 40px 38px;
  width: 100%; max-width: 400px;
  position: relative;
  box-shadow: 0 40px 100px rgba(0,0,0,0.6), 0 0 60px rgba(58,255,122,0.08);
  transform: scale(.94) translateY(10px);
  transition: transform .3s;
}
.modal-overlay.open .modal { transform: scale(1) translateY(0); }
.modal::before {
  content:'';
  position:absolute;
  top:0; left:20%; right:20%; height:1px;
  background: linear-gradient(90deg, transparent, rgba(58,255,122,0.5), transparent);
}
.modal-close {
  position: absolute; top: 16px; right: 18px;
  background: none; border: none;
  color: var(--text-muted); font-size: 1.3rem;
  cursor: pointer; transition: color .2s;
