<!DOCTYPE html><html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ethic Client</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"><style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #0a0a0a;
    color: white;
    overflow-x: hidden;
}

/* ===== MOVING LIGHT ===== */
.light {
    position: fixed;
    width: 200%;
    height: 200%;
    top: -50%;
    left: -50%;
    background: radial-gradient(circle, rgba(255,100,200,0.15), transparent 60%);
    animation: moveLight 30s ease-in-out infinite;
    z-index: -1;
}

@keyframes moveLight {
    0% { transform: translate(0,0); }
    50% { transform: translate(10%, 15%); }
    100% { transform: translate(0,0); }
}

/* ===== ANIMATED GRADIENT TEXT ===== */
h1 {
    font-size: 50px;
    background: linear-gradient(90deg, #ff6ec7, #ff9bdc, #ff6ec7);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: gradientMove 6s linear infinite;
}

@keyframes gradientMove {
    0% { background-position: 0%; }
    100% { background-position: 200%; }
}

/* ===== LIQUID NAVBAR ===== */
.navbar {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 85%;
    padding: 15px 30px;
    border-radius: 60px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(30px);
    box-shadow: inset 0 0 25px rgba(255,255,255,0.2);
    display: flex;
    justify-content: space-between;
    z-index: 9999;
}

.nav-right a {
    margin-left: 20px;
    color: white;
    text-decoration: none;
}

.section {
    padding: 150px 20px;
    text-align: center;
}

/* ===== VIDEO (NO GLOW) ===== */
.video-box {
    margin: 40px auto;
    width: 80%;
    max-width: 800px;
    border-radius: 25px;
    overflow: hidden;
}

iframe {
    width: 100%;
    height: 450px;
}

/* ===== CARDS ===== */
.card {
    background: rgba(255,255,255,0.05);
    padding: 25px;
    border-radius: 20px;
    backdrop-filter: blur(20px);
    margin: 10px;
}

.pricing {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}

.buy-btn {
    margin-top: 10px;
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: linear-gradient(90deg, #ff6ec7, #ff9bdc);
    color: white;
    cursor: pointer;
}

/* ===== LOGIN ===== */
.login-box {
    margin: 40px auto;
    width: 300px;
    padding: 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
}

input {
    width: 90%;
    margin: 10px 0;
    padding: 10px;
    border-radius: 10px;
    border: none;
}

button.login {
    width: 100%;
    padding: 10px;
    border-radius: 15px;
    border: none;
    background: linear-gradient(90deg, #ff6ec7, #ff9bdc);
    color: white;
}

/* ===== PANEL ===== */
.panel {
    display: none;
    padding: 150px 20px;
    text-align: center;
}

.panel-box {
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 20px;
    backdrop-filter: blur(20px);
    max-width: 600px;
    margin: auto;
}

.download-btn {
    padding: 12px 25px;
    border-radius: 20px;
    border: none;
    background: linear-gradient(90deg, #ff6ec7, #ff9bdc);
    color: white;
    margin-top: 20px;
}

</style></head>
<body><div class="light"></div><div class="navbar">
    <div>Ethic Client</div>
    <div class="nav-right">
        <a href="#pricing">Cennik</a>
        <a href="#login">Login</a>
        <a href="#">Discord</a>
    </div>
</div><div class="section" id="home">
    <h1>Ethic Client</h1>
    <div class="video-box">
        <iframe src="https://www.youtube.com/embed/VIDEO_ID"></iframe>
    </div>
</div><div id="pricing" class="section">
    <h2>Cennik</h2>
    <div class="pricing">
        <div class="card">
            <h3>Lifetime</h3>
            <p>50 zł</p>
            <button class="buy-btn" onclick="buy()">Kup</button>
        </div>
        <div class="card">
            <h3>Rok</h3>
            <p>35 zł</p>
            <button class="buy-btn" onclick="buy()">Kup</button>
        </div>
        <div class="card">
            <h3>Miesiąc</h3>
            <p>20 zł</p>
            <button class="buy-btn" onclick="buy()">Kup</button>
        </div>
    </div>
    <p>BLIK • Przelew • PSC (+12%) • BTC • LTC</p>
</div><div id="login" class="section">
    <h2>Login</h2>
    <div class="login-box">
        <input id="user" placeholder="Login">
        <input id="pass" type="password" placeholder="Hasło">
        <button class="login" onclick="login()">Zaloguj</button>
    </div>
</div><div id="panel" class="panel">
    <div class="panel-box">
        <h2>Panel klienta</h2>
        <p>Witaj w panelu 👋</p>
        <button class="download-btn">Download Client</button>
        <p style="margin-top:20px;">Changelog:
        <br>• Update 1.0
        <br>• Fix bugów
        </p>
    </div>
</div><script>
function buy() {
    window.location.href = "https://discord.gg/TWOJ_LINK";
}

function login() {
    document.getElementById('panel').style.display = 'block';
    document.getElementById('login').style.display = 'none';
}
</script></body>
</html>
