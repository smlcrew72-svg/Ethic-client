<!DOCTYPE html><html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ethic Client</title>
<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
}/* Snow */ .snowflake { position: fixed; top: -10px; color: white; font-size: 10px; animation: fall linear infinite; }

@keyframes fall { to { transform: translateY(110vh); } }

/* Navbar */ .navbar { position: fixed; top: 0; width: 100%; backdrop-filter: blur(12px); background: rgba(255,255,255,0.05); display: flex; justify-content: space-between; padding: 15px 30px; z-index: 9999; }

.nav-left { font-weight: bold; }

.nav-right a { margin-left: 20px; color: white; text-decoration: none; cursor: pointer; }

/* Sections */ .section { padding: 120px 20px; text-align: center; }

/* Video */ .video-box { margin: 40px auto; width: 80%; max-width: 800px; border-radius: 20px; overflow: hidden; }

iframe { width: 100%; height: 450px; border: none; }

/* Pricing */ .pricing { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }

.card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; width: 200px; }

</style>
</head>
<body><div class="navbar">
    <div class="nav-left">Ethic Client</div>
    <div class="nav-right">
        <a href="#pricing">Cennik</a>
        <a href="#contact">Kontakt</a>
        <a href="#">Telegram</a>
        <a href="#">Discord</a>
    </div>
</div><div class="section">
    <h1>Ethic Client</h1>
    <p>Najlepszy client 🔥</p><div class="video-box">
    <iframe src="https://www.youtube.com/embed/RjGXUU9PKHc"></iframe>
</div>

</div><div id="pricing" class="section">
    <h2>Cennik</h2>
    <div class="pricing">
        <div class="card">
            <h3>Lifetime</h3>
            <p>50 zł</p>
        </div>
        <div class="card">
            <h3>Rok</h3>
            <p>35 zł</p>
        </div>
        <div class="card">
            <h3>Miesiąc</h3>
            <p>20 zł</p>
        </div>
    </div><p>Metody płatności:</p>
<p>BLIK, Przelew, PSC (+12%), Krypto (LTC, BTC)</p>

</div><div id="contact" class="section">
    <h2>Kontakt</h2>
    <p>Dodaj tutaj swoje dane kontaktowe</p>
</div><script>
function createSnowflake() {
    const snow = document.createElement('div');
    snow.classList.add('snowflake');
    snow.innerText = '•';
    snow.style.left = Math.random() * window.innerWidth + 'px';
    snow.style.animationDuration = (Math.random() * 3 + 2) + 's';
    document.body.appendChild(snow);

    setTimeout(() => {
        snow.remove();
    }, 5000);
}

setInterval(createSnowflake, 100);
</script></body>
</html>
