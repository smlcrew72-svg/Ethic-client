<!DOCTYPE html><html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ethic Client</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"><style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: black;
    color: white;
    overflow-x: hidden;
}

/* ====== ANIMATED WAVE BACKGROUND ====== */
.bg {
    position: fixed;
    width: 200%;
    height: 200%;
    top: -50%;
    left: -50%;
    background: radial-gradient(circle at 30% 30%, rgba(0,255,200,0.15), transparent 60%),
                radial-gradient(circle at 70% 70%, rgba(0,150,255,0.12), transparent 60%),
                radial-gradient(circle at 50% 50%, rgba(255,0,150,0.08), transparent 70%);
    animation: wave 40s ease-in-out infinite;
    z-index: -1;
}

@keyframes wave {
    0% { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(8deg) scale(1.1); }
    100% { transform: rotate(0deg) scale(1); }
}

/* ====== LIQUID GLASS NAVBAR ====== */
.navbar {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 85%;
    padding: 15px 30px;
    border-radius: 60px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(25px);
    box-shadow: 
        inset 0 0 20px rgba(255,255,255,0.25),
        0 10px 40px rgba(0,0,0,0.8);
    display: flex;
    justify-content: space-between;
    z-index: 9999;
}

.nav-left {
    font-weight: 600;
}

.nav-right a {
    margin-left: 20px;
    color: white;
    text-decoration: none;
    position: relative;
}

.nav-right a::after {
    content: "";
    position: absolute;
    width: 0;
    height: 2px;
    background: cyan;
    bottom: -5px;
    left: 0;
    transition: 0.3s;
}

.nav-right a:hover::after {
    width: 100%;
}

.section {
    padding: 150px 20px;
    text-align: center;
}

h1 {
    font-size: 50px;
    background: linear-gradient(90deg, #00ffc8, #0099ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* ===== VIDEO ===== */
.video-box {
    margin: 40px auto;
    width: 80%;
    max-width: 800px;
    border-radius: 25px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(0,255,200,0.2);
}

iframe {
    width: 100%;
    height: 450px;
}

/* ===== PRICING ===== */
.pricing {
    display: flex;
    justify-content: center;
    gap: 25px;
    flex-wrap: wrap;
}

.card {
    background: rgba(255,255,255,0.06);
    padding: 25px;
    border-radius: 20px;
    width: 220px;
    backdrop-filter: blur(20px);
    box-shadow: inset 0 0 15px rgba(255,255,255,0.2);
    transition: 0.4s;
}

.card:hover {
    transform: translateY(-10px) scale(1.05);
    box-shadow: 0 0 40px rgba(0,255,200,0.4);
}

.price {
    font-size: 30px;
    color: #00ffc8;
}

.buy-btn {
    margin-top: 10px;
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: linear-gradient(90deg, #00ffc8, #0099ff);
    color: black;
    cursor: pointer;
}

/* ===== LOGIN ===== */
.login-box {
    margin: 40px auto;
    width: 300px;
    padding: 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
}

input {
    width: 90%;
    margin: 10px 0;
    padding: 10px;
    border-radius: 10px;
    border: none;
}

button.login {
    width: 100%;
    padding: 10px;
    border-radius: 15px;
    border: none;
    background: linear-gradient(90deg, #00ffc8, #0099ff);
    color: black;
}

</style></head>
<body><div class="bg"></div><div class="navbar">
    <div class="nav-left">Ethic Client</div>
    <div class="nav-right">
        <a href="#pricing">Cennik</a>
        <a href="#login">Login</a>
        <a href="#">Telegram</a>
        <a href="#">Discord</a>
    </div>
</div><div class="section">
    <h1>Ethic Client</h1>
    <p>Next level client</p><div class="video-box">
    <iframe src="https://www.youtube.com/embed/RjGXUU9PKHc"></iframe>
</div>

</div><div id="pricing" class="section">
    <h2>Cennik</h2><div class="pricing">
    <div class="card">
        <h3>Lifetime</h3>
        <div class="price">50 zł</div>
        <button class="buy-btn" onclick="buy()">Kup</button>
    </div>

    <div class="card">
        <h3>Rok</h3>
        <div class="price">35 zł</div>
        <button class="buy-btn" onclick="buy()">Kup</button>
    </div>

    <div class="card">
        <h3>Miesiąc</h3>
        <div class="price">20 zł</div>
        <button class="buy-btn" onclick="buy()">Kup</button>
    </div>
</div>

<p style="margin-top:30px; opacity:0.8;">
    BLIK • Przelew • PSC (+12%) • Krypto (BTC, LTC)
</p>

</div><div id="login" class="section">
    <h2>Panel logowania</h2><div class="login-box">
    <input type="text" placeholder="Login">
    <input type="password" placeholder="Hasło">
    <button class="login">Zaloguj</button>
</div>

</div><script>
function buy() {
    window.location.href = "https://discord.gg/TWOJ_LINK";
}
</script></body>
</html>
