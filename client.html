<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ethic Client</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
 margin:0;
 font-family:'Poppins',sans-serif;
 background:#050505;
 color:white;
 overflow:hidden;
}

/* ===== CURSOR LIGHT ===== */
.cursor-light{
 position:fixed;
 width:300px;
 height:300px;
 border-radius:50%;
 pointer-events:none;
 background:radial-gradient(circle,rgba(255,120,200,0.15),transparent 70%);
 transform:translate(-50%,-50%);
 z-index:0;
}

/* ===== MOVING LINES ===== */
.bg{
 position:fixed;
 width:200%;
 height:200%;
 top:-50%;
 left:-50%;
 background:linear-gradient(120deg,transparent 40%,rgba(255,120,200,0.06) 50%,transparent 60%);
 animation:move 20s linear infinite;
 z-index:-1;
}
@keyframes move{
 0%{transform:translateX(-20%) rotate(10deg)}
 100%{transform:translateX(20%) rotate(10deg)}
}

/* ===== NAVBAR ===== */
.navbar{
 position:fixed;
 top:15px;
 left:50%;
 transform:translateX(-50%);
 width:92%;
 padding:12px 20px;
 border-radius:40px;
 background:rgba(255,255,255,0.06);
 backdrop-filter:blur(30px);
 border:1px solid rgba(255,255,255,0.1);
 display:flex;
 justify-content:space-between;
 z-index:1000;
}

.nav-right a{
 margin-left:15px;
 color:#eee;
 text-decoration:none;
 cursor:pointer;
 transition:0.3s;
}
.nav-right a:hover{opacity:0.6}

/* ===== PAGES SYSTEM ===== */
.page{
 position:absolute;
 width:100%;
 height:100vh;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 opacity:0;
 pointer-events:none;
 transform:translateY(30px);
 transition:0.6s ease;
}
.page.active{
 opacity:1;
 pointer-events:auto;
 transform:translateY(0);
}

/* ===== TEXT ===== */
h1{
 font-size:42px;
 background:linear-gradient(90deg,#ff6ec7,#ffb3e6,#ff6ec7);
 background-size:200%;
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
 animation:grad 6s linear infinite;
}
@keyframes grad{
 0%{background-position:0%}
 100%{background-position:200%}
}

/* ===== LIQUID BOX ===== */
.box{
 background:rgba(255,255,255,0.05);
 backdrop-filter:blur(25px);
 border-radius:20px;
 border:1px solid rgba(255,255,255,0.1);
 padding:20px;
}

/* VIDEO */
.video-box{width:90%;max-width:700px;border-radius:20px;overflow:hidden}
iframe{width:100%;height:260px}

/* PRICING */
.pricing{display:flex;gap:15px;flex-wrap:wrap;justify-content:center}
.card{width:150px;padding:15px;border-radius:15px;background:rgba(255,255,255,0.05)}
.price{margin:5px 0}
.buy{width:100%;padding:8px;border-radius:10px;border:none;background:linear-gradient(90deg,#ff6ec7,#ff9bdc);color:white}

/* LOGIN */
input{width:100%;margin:6px 0;padding:10px;border-radius:10px;border:none}
.btn{width:100%;padding:10px;border:none;border-radius:12px;background:linear-gradient(90deg,#ff6ec7,#ff9bdc);color:white}

@media(min-width:700px){iframe{height:400px}h1{font-size:55px}}
</style>
</head>
<body>

<div class="bg"></div>
<div class="cursor-light" id="light"></div>

<div class="navbar">
 <div>Ethic</div>
 <div class="nav-right">
  <a onclick="show('home')">Home</a>
  <a onclick="show('pricing')">Cennik</a>
  <a onclick="show('login')">Login</a>
  <a onclick="show('contact')">Kontakt</a>
 </div>
</div>

<!-- HOME -->
<div id="home" class="page active">
 <h1>Ethic Client</h1>
 <div class="video-box box">
  <iframe src="https://www.youtube.com/embed/VIDEO_ID"></iframe>
 </div>
</div>

<!-- PRICING -->
<div id="pricing" class="page">
 <h1>Cennik</h1>
 <div class="pricing">
  <div class="card box">
   Lifetime
   <div class="price">50 zł</div>
   <button class="buy" onclick="buy()">Kup</button>
  </div>
  <div class="card box">
   Rok
   <div class="price">35 zł</div>
   <button class="buy" onclick="buy()">Kup</button>
  </div>
  <div class="card box">
   Miesiąc
   <div class="price">20 zł</div>
   <button class="buy" onclick="buy()">Kup</button>
  </div>
 </div>
 <div style="margin-top:20px;opacity:0.8">BLIK • Przelew • PSC (+12%) • LTC • BTC</div>
</div>

<!-- LOGIN -->
<div id="login" class="page">
 <h1>Login</h1>
 <div class="box" style="width:260px">
  <input id="user" placeholder="Login">
  <input id="pass" type="password" placeholder="Hasło">
  <button class="btn" onclick="login()">Zaloguj</button>
 </div>
</div>

<!-- PANEL -->
<div id="panel" class="page">
 <h1>Panel</h1>
 <div class="box" style="max-width:500px">
  <p>Download dostępny po zakupie</p>
  <button class="btn" onclick="download()">Download</button>
  <p id="status"></p>
 </div>
</div>

<!-- CONTACT -->
<div id="contact" class="page">
 <h1>Kontakt</h1>
 <div class="box">
  <p>Discord: TWÓJ_DISCORD</p>
  <p>Telegram: TWÓJ_TELEGRAM</p>
 </div>
</div>

<script>

/* NAVIGATION */
function show(id){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

/* CURSOR LIGHT */
document.addEventListener('mousemove',e=>{
 const l=document.getElementById('light');
 l.style.left=e.clientX+'px';
 l.style.top=e.clientY+'px';
});

/* BUY */
function buy(){
 localStorage.setItem('bought','true');
 window.location.href="https://discord.gg/TWOJ_LINK";
}

/* LOGIN */
function login(){
 localStorage.setItem('logged','true');
 show('panel');
}

/* DOWNLOAD */
function download(){
 if(localStorage.getItem('bought')==='true'){
  document.getElementById('status').innerText='Pobieranie...';
 }else{
  document.getElementById('status').innerText='Kup dostęp najpierw';
 }
}

</script>

</body>
</html>
